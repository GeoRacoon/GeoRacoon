name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    # we exclude draft here
    types: [opened, synchronize, reopened, edited, ready_for_review]
    branches:
      - main

jobs:
  unit-tests:
    if: github.event_name == 'pull_request' && github.event.pull_request != null && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        lfs: 'true'
        submodules: recursive
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -e .[testing]
    
    - name: Run tests with coverage
      run: |
        source .venv/bin/activate
        python -c "import multiprocessing; print(multiprocessing.cpu_count())"
        python -m pytest -s -vvv --timeout 300 --cov
      env:
        COVERAGE_FILE: ".coverage.unittests"
    - name: Store coverage file
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-unittests
        path: .coverage.unittests
        include-hidden-files: true

  coverage:
    name: coverage-combine-publish
    runs-on: ubuntu-24.04
    needs: [unit-tests, ]
    if: needs.unit-tests.result == 'success' || needs.unit-tests.result == 'failure'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        id: download
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Check content
        run: |
          ls -ahl

      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COVERAGE_FILES: true

      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@v4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
